<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>divi — apps</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 48px 32px 24px;
      text-align: center;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #555;
    }

    .grid {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
      justify-content: center;
      align-items: flex-start;
      padding: 32px;
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
    }

    .app-card {
      -webkit-tap-highlight-color: transparent;
      outline: none;
      -webkit-touch-callout: none;
      user-select: none;
      background: #13131a;
      border: 1px solid #1e1e2e;
      border-radius: 20px;
      width: 260px;
      padding: 28px 24px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
    }

    .app-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: radial-gradient(ellipse at 50% 0%, rgba(120, 80, 255, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .app-card:hover {
      transform: translateY(-4px);
      border-color: #3a2a6a;
      box-shadow: 0 12px 40px rgba(100, 60, 220, 0.18);
    }

    .app-icon {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    .app-name {
      font-size: 1.2rem;
      font-weight: 600;
      color: #f0f0f0;
      letter-spacing: 0.02em;
    }

    .app-desc {
      font-size: 0.82rem;
      color: #777;
      text-align: center;
      line-height: 1.55;
    }

    .badge {
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1c1c2e;
      border: 1px solid #2a2a40;
      border-radius: 50px;
      padding: 7px 14px;
      font-size: 0.75rem;
      color: #aaa;
      letter-spacing: 0.04em;
      transition: background 0.2s, color 0.2s;
    }

    .app-card:hover .badge {
      background: #28284a;
      color: #ccc;
    }

    .badge svg {
      flex-shrink: 0;
    }

    footer {
      text-align: center;
      padding: 16px;
      font-size: 0.72rem;
      color: #333;
      letter-spacing: 0.08em;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to bottom, transparent, #0a0a0f 60%);
      pointer-events: none;
    }

    @media (max-height: 700px), (max-width: 400px) {
      header {
        padding: 24px 32px 12px;
      }

      .grid {
        padding: 16px;
        gap: 16px;
      }

      .app-card {
        padding: 20px 18px 18px;
        gap: 10px;
      }

      .app-icon {
        width: 72px;
        height: 72px;
      }

      footer {
        padding: 16px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>divi</h1>
  </header>

  <div class="grid">

    <a class="app-card" href="https://play.google.com/store/apps/details?id=divi.clock" target="_blank" rel="noopener">
      <img class="app-icon" src="https://play-lh.googleusercontent.com/VFz5lpnZJxOnSALN3f-swoBd2_SlBE43qOG4Lo1KPwn5_NR-5u6MgYGMc_utKrDmL9jxtA7RnVpD2gJ1H2Fk=w240-h480-rw" alt="DiviClock icon">
      <div class="app-name">DiviClock</div>
      <div class="app-desc">A cute and simple clock widget for your home screen.<br>Fully customizable: choose your fonts, colors, and text.</div>
      <div class="badge">
        <!-- Google Play triangle icon -->
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3.18 23.76c.37.2.8.2 1.18 0L20.5 14.2a1.5 1.5 0 0 0 0-2.6L4.36 2.04a1 1 0 0 0-1.18 0C2.8 2.3 2.5 2.74 2.5 3.22v17.56c0 .48.3.93.68 1.18z"/>
        </svg>
        Get it on Google Play
      </div>
    </a>

  </div>

  <footer>made with ♥ by Serena Traversi</footer>

</body>
</html>

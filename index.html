<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Divi Clock — a cute, free clock widget for Android. No ads, fully customizable.">
  <title>Divi Clock ✦ cute clock widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --pink:   #ff4081;
      --mint:   #00c896;
      --yellow: #ffd43b;
      --purple: #845ef7;
      --sky:    #339af0;
      --bg:     #fffaf5;
      --text:   #1e1e2e;
      --muted:  #7c7c8e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Fredoka', system-ui, sans-serif;
      font-weight: 400;
      overflow-x: hidden;
    }

    /* ── Confetti dots ──────────────────────────────────────────────────── */
    .confetti { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .dot {
      position: absolute; border-radius: 50%; opacity: .5;
      animation: drift var(--d,8s) var(--del,0s) ease-in-out infinite alternate;
    }
    @keyframes drift {
      from { transform: translateY(0) rotate(0deg); }
      to   { transform: translateY(-20px) rotate(30deg); }
    }

    /* ══════════════════════════════════════════════════════════════════════
       HERO — compact, just enough to identify the app
    ══════════════════════════════════════════════════════════════════════ */
    .hero {
      position: relative; z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 48px 24px 36px;
      gap: 0;
    }

    /* icon */
    .icon-wrap {
      position: relative;
      margin-bottom: 20px;
    }
    .icon-wrap::before {
      content: '';
      position: absolute; inset: -8px;
      border-radius: 32px;
      background: conic-gradient(var(--pink), var(--yellow), var(--mint), var(--sky), var(--purple), var(--pink));
      animation: spin 6s linear infinite;
      z-index: -1;
      filter: blur(3px);
      opacity: .65;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .app-icon {
      width: 96px; height: 96px;
      border-radius: 24px;
      display: block;
      border: 4px solid #fff;
      box-shadow: 0 4px 24px rgba(0,0,0,.12);
      animation: bob 4s ease-in-out infinite;
    }
    @keyframes bob {
      0%,100% { transform: translateY(0) rotate(-1deg); }
      50%      { transform: translateY(-8px) rotate(1deg); }
    }

    /* title */
    h1 {
      font-family: 'Bungee', sans-serif;
      font-size: clamp(2rem, 8vw, 3.2rem);
      line-height: 1;
    }
    .word-divi  { color: var(--pink);   text-shadow: 4px 4px 0 rgba(255,64,129,.18); }
    .word-clock { color: var(--mint);   text-shadow: 4px 4px 0 rgba(0,200,150,.18); }

    .is-back {
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      font-size: clamp(1rem, 3.5vw, 1.25rem);
      color: var(--purple);
      margin-top: 6px;
    }

    /* ══════════════════════════════════════════════════════════════════════
       SHOWCASE — full-bleed colored band, BIG phones
    ══════════════════════════════════════════════════════════════════════ */
    .showcase {
      position: relative; z-index: 1;
      width: 100%;
      background: linear-gradient(160deg, #fff0f7 0%, #f3f0ff 50%, #e8fff9 100%);
      border-top: 3px solid #ffc2d4;
      border-bottom: 3px solid #99e6d0;
      padding: 40px 0 44px;
      overflow: hidden;
    }

    /* subtle big circles in bg of showcase */
    .showcase::before, .showcase::after {
      content: ''; position: absolute; border-radius: 50%;
      pointer-events: none; z-index: 0;
      filter: blur(60px); opacity: .28;
    }
    .showcase::before {
      width: 300px; height: 300px;
      background: var(--pink);
      top: -80px; left: -60px;
    }
    .showcase::after {
      width: 280px; height: 280px;
      background: var(--mint);
      bottom: -80px; right: -60px;
    }

    /* ── stacked cascade ──────────────────────────────────────────────── */
    .phones-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 80px 60px;
      position: relative; z-index: 1;
    }

    .phone {
      width: 230px;
      border-radius: 34px;
      overflow: hidden;
      background: #000;
      border: 4px solid transparent;
      box-shadow: 0 16px 56px rgba(0,0,0,.25);
      position: relative;
      /* initial hidden state — JS adds .visible */
      opacity: 0;
      transition:
        opacity   .5s ease,
        transform .6s cubic-bezier(.34,1.4,.64,1),
        box-shadow .3s ease;
    }
    .phone::before { /* notch */
      content: '';
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 50px; height: 11px;
      background: #000;
      border-radius: 0 0 11px 11px;
      z-index: 2;
    }
    .phone img { width: 100%; display: block; }

    /* alternating offsets + rotations — final resting positions */
    .phone:nth-child(1) { border-color: var(--pink);   --tx: -42px; --rot: -4deg;  --delay: 0s;   z-index: 1; }
    .phone:nth-child(2) { border-color: var(--yellow); --tx:  38px; --rot:  3deg;  --delay: .12s; z-index: 2; margin-top: -135px; }
    .phone:nth-child(3) { border-color: var(--mint);   --tx: -32px; --rot: -2.5deg;--delay: .24s; z-index: 3; margin-top: -135px; }
    .phone:nth-child(4) { border-color: var(--purple); --tx:  40px; --rot:  4deg;  --delay: .36s; z-index: 4; margin-top: -135px; }

    /* hidden → slide in from below */
    .phone:not(.visible) {
      transform: translateX(var(--tx)) rotate(var(--rot)) translateY(60px);
    }
    .phone.visible {
      opacity: 1;
      transform: translateX(var(--tx)) rotate(var(--rot)) translateY(0);
      transition-delay: var(--delay);
    }
    .phone:hover {
      transform: translateX(var(--tx)) rotate(0deg) translateY(-14px) scale(1.04) !important;
      box-shadow: 0 32px 72px rgba(0,0,0,.32);
      z-index: 10 !important;
    }

    .swipe-hint { display: none; }

    @media (max-width: 400px) {
      .phone { width: 200px; }
      .phone:nth-child(1) { --tx: -30px; }
      .phone:nth-child(2) { --tx:  26px; }
      .phone:nth-child(3) { --tx: -22px; }
      .phone:nth-child(4) { --tx:  28px; }
      .phones-stack { padding: 20px 50px 50px; }
    }

    /* ══════════════════════════════════════════════════════════════════════
       INFO — description + badges
    ══════════════════════════════════════════════════════════════════════ */
    .info {
      position: relative; z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0 24px 28px;
      max-width: 680px;
      margin: 0 auto;
    }

    .app-desc {
      font-size: clamp(.95rem, 3vw, 1.1rem);
      font-weight: 500;
      color: var(--muted);
      line-height: 1.7;
      max-width: 400px;
    }
    .app-desc strong { color: var(--text); }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 24px;
    }
    .badge {
      font-family: 'Fredoka', sans-serif;
      font-size: clamp(.85rem, 2.8vw, 1rem);
      font-weight: 700;
      border-radius: 50px;
      padding: 9px 20px;
      border: 3px solid transparent;
      white-space: nowrap;
    }
    .b-pink   { background: #fff0f5; color: var(--pink);   border-color: #ffc2d4; }
    .b-mint   { background: #e8fff8; color: #00a87a;       border-color: #99e6d0; }
    .b-yellow { background: #fffbe6; color: #c98d00;       border-color: #ffe47a; }
    .b-purple { background: #f3f0ff; color: var(--purple); border-color: #c4b5fd; }
    .b-sky    { background: #eff8ff; color: var(--sky);    border-color: #93d5fd; }

    /* ── CTA ────────────────────────────────────────────────────────────── */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
      outline: none;
      background: var(--text);
      color: #fff;
      font-family: 'Fredoka', sans-serif;
      font-size: clamp(1rem, 3.5vw, 1.2rem);
      font-weight: 700;
      letter-spacing: .04em;
      text-decoration: none;
      border-radius: 50px;
      padding: 17px 36px;
      box-shadow: 6px 6px 0 var(--pink);
      transition: transform .2s ease, box-shadow .2s ease;
      border: 3px solid var(--text);
    }
    .cta:hover  { transform: translate(-3px,-3px); box-shadow: 9px 9px 0 var(--pink); }
    .cta:active  { transform: translate(2px, 2px);  box-shadow: 3px 3px 0 var(--pink); }
    .cta:focus, .cta:focus-visible { outline: none; }

    /* ── Footer ─────────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 48px 16px 32px;
      font-family: 'Fredoka', sans-serif;
      font-size: .82rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: .06em;
      position: relative; z-index: 1;
    }
    footer a { color: var(--pink); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 360px) {
      .phone { width: 72vw; }
    }
  </style>
</head>
<body>


  <!-- ── compact hero ─────────────────────────────────────────────────── -->
  <div class="hero">
    <div class="icon-wrap">
      <img class="app-icon" src="diviclock.png" alt="Divi Clock">
    </div>
    <h1><span class="word-divi">DIVI</span> <span class="word-clock">CLOCK</span></h1>
    <p class="is-back">is back! 💚</p>

    <div class="cta" onclick="location.href='https://play.google.com/store/apps/details?id=divi.clock'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M3.18 23.76c.37.2.8.2 1.18 0L20.5 14.2a1.5 1.5 0 0 0 0-2.6L4.36 2.04a1 1 0 0 0-1.18 0C2.8 2.3 2.5 2.74 2.5 3.22v17.56c0 .48.3.93.68 1.18z"/>
      </svg>
      Get it on Google Play
    </div>
  </div>

  <!-- ── description ──────────────────────────────────────────────────── -->
  <div class="info">
    <p class="app-desc">
      A cute minimal clock widget for your Android home screen.<br>
      <strong>100% free — no ads, no trackers, ever. 🎉</strong><br>
      Customize fonts, colors, timezones and more.
    </p>
  </div>

  <!-- ── screenshot showcase ──────────────────────────────────────────── -->
  <section class="showcase" aria-label="Screenshots">
    <div class="phones-stack">
      <div class="phone"><img src="Screenshot_phone1.jpg" alt="Screenshot 1" loading="eager"></div>
      <div class="phone"><img src="Screenshot_phone2.jpg" alt="Screenshot 2" loading="lazy"></div>
      <div class="phone"><img src="Screenshot_phone3.jpg" alt="Screenshot 3" loading="lazy"></div>
      <div class="phone"><img src="Screenshot_phone4.jpg" alt="Screenshot 4" loading="lazy"></div>
    </div>
  </section>

  <!-- ── badges ───────────────────────────────────────────────────────── -->
  <div class="info">
    <div class="badges">
      <span class="badge b-mint">✨ Free</span>
      <span class="badge b-pink">🚫 No Ads</span>
      <span class="badge b-purple">🎨 Fully Customizable</span>
      <span class="badge b-yellow">🔤 Custom Fonts</span>
      <span class="badge b-sky">🌍 Timezones</span>
    </div>
  </div>

  <footer>
    made with ♥ by Serena Traversi
  </footer>

  <script>
    // Animate phones in as they enter the viewport
    const phones = document.querySelectorAll('.phone');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
    }, { threshold: 0.15 });
    phones.forEach(p => observer.observe(p));
  </script>
</body>
</html>
